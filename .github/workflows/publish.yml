name: Build and Push OpenClaw

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  OPENCLAW_SANDBOX_VARIANT: "slim"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          path: openclaw
          ref: 61d171ab0b2fe4abc9afe89c518586274b4b76c2
          fetch-depth: 1

      - name: Set lower case repo name
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Main Image
        uses: docker/build-push-action@v6
        with:
          context: openclaw
          file: openclaw/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OPENCLAW_VARIANT=${{ env.OPENCLAW_SANDBOX_VARIANT }}
            OPENCLAW_INSTALL_DOCKER_CLI=1
          tags: ${{ env.IMAGE_PREFIX }}/openclaw:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Sandbox Base
        uses: docker/build-push-action@v6
        with:
          context: openclaw
          file: openclaw/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/openclaw-sandbox:base
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Customized Sandbox
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/openclaw-sandbox:base
          tags: ${{ env.IMAGE_PREFIX }}/openclaw-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Sandbox Common
        uses: docker/build-push-action@v6
        with:
          context: openclaw
          file: openclaw/Dockerfile.sandbox-common
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/openclaw-sandbox:latest
          tags: ${{ env.IMAGE_PREFIX }}/openclaw-sandbox-common:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Browser Sandbox
        uses: docker/build-push-action@v6
        with:
          context: openclaw
          file: openclaw/Dockerfile.sandbox-browser
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/openclaw-sandbox-browser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
