name: Build and Push OpenClaw

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  OPENCLAW_SANDBOX: "1"
  OPENCLAW_SANDBOX_VARIANT: "slim"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          path: openclaw
          ref: 61d171ab0b2fe4abc9afe89c518586274b4b76c2
          fetch-depth: 1

      - name: Set lower case repo name
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Images
        run: |
          # Build main image from the openclaw/ directory
          echo "==> Building Main image (slim)"
          docker build \
            --build-arg "OPENCLAW_VARIANT=${{ env.OPENCLAW_SANDBOX_VARIANT }}" \
            --build-arg "OPENCLAW_INSTALL_DOCKER_CLI=1" \
            -t "openclaw:local" \
            -f "openclaw/Dockerfile" \
            openclaw/

          # Build minimal sandbox image from our ROOT Dockerfile
          if [ "${{ env.OPENCLAW_SANDBOX }}" = "1" ]; then
            # 1. Build the "vanilla" base first from the openclaw/ folder
            echo "==> Building Vanilla Sandbox base"
            docker build \
              -t "openclaw-sandbox-base:bookworm-slim" \
              -f "openclaw/Dockerfile.sandbox" \
              openclaw/

            # 2. Build our customized sandbox using the vanilla base
            echo "==> Building Customized Sandbox image"
            docker build \
              -t "openclaw-sandbox:bookworm-slim" \
              -f "Dockerfile.sandbox" \
              .

            # 3. Build sandbox common image (inherits from openclaw-sandbox:bookworm-slim)
            echo "==> Building Sandbox Common image"
            docker build \
              -t "openclaw-sandbox-common:bookworm-slim" \
              -f "openclaw/Dockerfile.sandbox-common" \
              openclaw/

            # Build browser sandbox image manually from the openclaw/ directory
            echo "==> Building Browser Sandbox image"
            docker build \
              -t "openclaw-sandbox-browser:bookworm-slim" \
              -f "openclaw/Dockerfile.sandbox-browser" \
              openclaw/
          fi

      - name: Push to GHCR
        run: |
          TAG_PUSH() {
            docker tag "$1" "$IMAGE_PREFIX/$2:latest"
            docker push "$IMAGE_PREFIX/$2:latest"
          }

          TAG_PUSH "openclaw:local" "openclaw"

          if [ "${{ env.OPENCLAW_SANDBOX }}" = "1" ]; then
            for img in openclaw-sandbox openclaw-sandbox-common openclaw-sandbox-browser; do
              TAG_PUSH "$img:bookworm-slim" "$img"
            done
          fi
