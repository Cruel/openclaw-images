name: Build and Push OpenClaw

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  OPENCLAW_SANDBOX_VARIANT: "slim"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: Cruel/openclaw
          path: openclaw
          ref: secure
          fetch-depth: 1

      - name: Set lower case repo name
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Extract Base Image Digests
        run: |
          # Extract the full Node Slim image (including name + digest) from their Dockerfile
          NODE_IMAGE=$(grep -oP 'OPENCLAW_NODE_BOOKWORM_SLIM_IMAGE="\K[^"]+' openclaw/Dockerfile || head -n 1)
          echo "OPENCLAW_NODE_IMAGE=$NODE_IMAGE" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push all images
        uses: docker/bake-action@v7
        env:
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          OPENCLAW_VARIANT: ${{ env.OPENCLAW_SANDBOX_VARIANT }}
          OPENCLAW_NODE_IMAGE: ${{ env.OPENCLAW_NODE_IMAGE }}
        with:
          push: true
          source: .
          # Inherit caching from GitHub Actions
          set: |
            gateway.cache-from=type=gha,scope=gateway
            gateway.cache-to=type=gha,mode=max,scope=gateway
            sandbox.cache-from=type=gha,scope=sandbox
            sandbox.cache-to=type=gha,mode=max,scope=sandbox
            sandbox-browser.cache-from=type=gha,scope=sandbox-browser
            sandbox-browser.cache-to=type=gha,mode=max,scope=sandbox-browser
            node.cache-from=type=gha,scope=node
            node.cache-to=type=gha,mode=max,scope=node
            sandbox-base.cache-from=type=gha,scope=sandbox-base
            sandbox-base.cache-to=type=gha,mode=max,scope=sandbox-base
            sandbox-common.cache-from=type=gha,scope=sandbox-common
            sandbox-common.cache-to=type=gha,mode=max,scope=sandbox-common
