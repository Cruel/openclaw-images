services:
  # The Secure Ubuntu Sandbox (All-in-One: OpenClaw + Docker + Predicate + Mitmproxy)
  openclaw-node:
    image: ghcr.io/cruel/openclaw-images/openclaw-node:latest
    runtime: ${OPENCLAW_NODE_RUNTIME:-runc}
    privileged: ${OPENCLAW_NODE_PRIVILEGED:-false}
    environment:
      - PREDICATE_AUTHORITY_URL=http://localhost:8787
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./predicate-authorityd.toml:/etc/predicate/authorityd.toml:ro
      - ./policy.yaml:/etc/predicate/policy.yaml:ro
      - ./mitm_filter.py:/etc/mitmproxy/mitm_filter.py:ro
      - ./iptables-rules.sh:/usr/local/bin/iptables-rules.sh:ro
      - ./node-docker-compose.yml:/home/node/docker-compose.yml:ro
      - ./node_config:/home/node/node_config
      - docker_lib:/var/lib/docker
    group_add:
      - "${DOCKER_GID:-999}"

  openclaw-gateway:
    image: ghcr.io/cruel/openclaw-images/openclaw-gateway:latest
    container_name: openclaw-gateway
    env_file: .env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./gateway_config:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json

  # Secure Remote Access via Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: always

volumes:
  docker_lib: