services:
  # The Secure Ubuntu Sandbox (All-in-One: OpenClaw + Docker + Predicate + Mitmproxy)
  openclaw-node:
    image: ghcr.io/cruel/openclaw-images/openclaw-node:latest
    pull_policy: always
    runtime: ${OPENCLAW_NODE_RUNTIME:-runc}
    privileged: ${OPENCLAW_NODE_PRIVILEGED:-false}
    restart: unless-stopped
    environment:
      - PREDICATE_AUTHORITY_URL=http://localhost:8787
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    networks:
      default:
        aliases:
          - openclaw-gateway
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - ./predicate-authorityd.toml:/etc/predicate/authorityd.toml:ro
      - ./policy.yaml:/etc/predicate/policy.yaml:ro
      - ./mitm_filter.py:/etc/mitmproxy/mitm_filter.py:ro
      - ./iptables-rules.sh:/usr/local/bin/iptables-rules.sh:ro
      - ./node-docker-compose.yml:/home/node/docker-compose.yml:ro
      - ./node_config:/home/node/node_config
      - ./node_data:/home/node/data
      - docker_lib:/var/lib/docker
      - ./workspace:/home/node/workspace
      - mitmproxy_certs:/home/mitm-proxy/.mitmproxy

  openclaw-gateway:
    image: ghcr.io/cruel/openclaw-images/openclaw-gateway:latest
    pull_policy: always
    container_name: openclaw-gateway
    env_file: .env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    network_mode: "service:openclaw-node"
    restart: unless-stopped
    environment:
      - NODE_EXTRA_CA_CERTS=/home/node/.mitmproxy/mitmproxy-ca-cert.pem
      - DOCKER_HOST=tcp://127.0.0.1:2375
    volumes:
      - ./gateway_config:/home/node/.openclaw
      - ./workspace:/home/node/workspace
      - ./node_data:/home/node/data
      - mitmproxy_certs:/home/node/.mitmproxy:ro

  # Secure Remote Access via Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: always

volumes:
  docker_lib:
  mitmproxy_certs: