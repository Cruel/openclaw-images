services:
  openclaw-node-host:
    image: ghcr.io/cruel/openclaw-images/openclaw-gateway:latest
    container_name: openclaw-node-host
    restart: always
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    command:
      [
        "node",
        "openclaw.mjs",
        "node",
        "run",
        "--host",
        "127.0.0.1",
        "--port",
        "18789",
      ]
    volumes:
      - ./node_config:/home/node/.openclaw
      - /var/run/docker.sock:/var/run/docker.sock
    # network_mode: "host" is required so it connects to the outer docker network namespace
    # and properly resolves the openclaw-gateway hostname through the outer Docker DNS.
    network_mode: "host"
