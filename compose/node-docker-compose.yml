services:
  openclaw-node-host:
    image: ghcr.io/cruel/openclaw-images/openclaw-gateway:latest
    pull_policy: always
    container_name: openclaw-node-host
    restart: always
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    command:
      [
        "node",
        "openclaw.mjs",
        "node",
        "run",
        "--host",
        "127.0.0.1",
        "--port",
        "18789",
      ]
    volumes:
      - ./node_config:/home/node/.openclaw
      - /var/run/docker.sock:/var/run/docker.sock
    # network_mode: "host" is required so it connects to the outer docker network namespace
    # and properly resolves the openclaw-gateway hostname through the outer Docker DNS.
    network_mode: "host"
  
  # Securely proxy the unix socket to TCP (localhost only)
  # This avoids sharing the entire /var/run directory with the outer gateway.
  socket-proxy:
    image: alpine/socat
    restart: always
    command: tcp-listen:2375,fork,reuseaddr unix-connect:/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    network_mode: "host"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U paperclip -d paperclip" ]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  paperclip:
    image: ghcr.io/cruel/openclaw-images/paperclip:latest
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@postgres:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - paperclip-data:/paperclip
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data: