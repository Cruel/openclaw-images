services:
  openclaw-node-host:
    image: ghcr.io/cruel/openclaw-images/openclaw-gateway:latest
    pull_policy: always
    container_name: openclaw-node-host
    restart: always
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    command:
      [
        "node",
        "openclaw.mjs",
        "node",
        "run",
        "--host",
        "127.0.0.1",
        "--port",
        "18789",
      ]
    volumes:
      - ./node_config:/home/node/.openclaw
      - /var/run/docker.sock:/var/run/docker.sock
    # network_mode: "host" is required so it connects to the outer docker network namespace
    # and properly resolves the openclaw-gateway hostname through the outer Docker DNS.
    network_mode: "host"
  
  # Securely proxy the unix socket to TCP (localhost only)
  # This avoids sharing the entire /var/run directory with the outer gateway.
  socket-proxy:
    image: alpine/socat
    restart: always
    command: tcp-listen:2375,fork,reuseaddr unix-connect:/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    network_mode: "host"
